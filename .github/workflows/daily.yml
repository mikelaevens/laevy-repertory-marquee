name: Daily Marquee Update

on:
  schedule:
    # 13:00 UTC = 6:00 AM Pacific (PDT). Theaters post schedules overnight.
    - cron: "0 13 * * *"
  workflow_dispatch: # allows "Run workflow" button in GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set today's date (Pacific time)
        run: echo "TODAY=$(TZ=America/Los_Angeles date +%Y-%m-%d)" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Restore today's scraped data from cache so that re-runs later in the day
      # (manual triggers or retries) fall back to morning's listings instead of
      # showing "Program To Be Posted" for venues that dropped past showtimes.
      - name: Restore today's data cache
        uses: actions/cache/restore@v4
        with:
          path: data/today.json
          key: today-json-${{ env.TODAY }}

      - name: Scrape today's listings
        run: npm run scrape
        env:
          TZ: America/Los_Angeles

      - name: Save today's data cache
        uses: actions/cache/save@v4
        with:
          path: data/today.json
          key: today-json-${{ env.TODAY }}

      - name: Build marquee HTML
        run: npm run build

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
